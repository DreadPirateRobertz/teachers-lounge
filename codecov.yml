coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 2%   # allow 2% drop before failing
        if_not_found: success
    patch:
      default:
        target: 90%     # new code in a PR must be 90% covered (TDD standard)
        threshold: 2%
        if_not_found: success

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true

notify:
  # Silence all Codecov notifications — no pings to repo watchers or Stilgar
  # Account-level email notifications must also be disabled on codecov.io UI
  after_n_builds: 1
  wait_for_ci: true
  email:
    default:
      enabled: false

github_checks:
  annotations: false

ignore:
  - "**/*_test.go"
  - "**/test_*.py"
  - "**/*.test.ts"
  - "**/migrations/**"
  - "**/Dockerfile*"
  - "infra/**"
  - "docs/**"
