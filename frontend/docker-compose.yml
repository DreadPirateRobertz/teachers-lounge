services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - TUTORING_SERVICE_URL=${TUTORING_SERVICE_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Local dev mode (mount source, hot reload)
  frontend-dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - TUTORING_SERVICE_URL=${TUTORING_SERVICE_URL:-}
    command: sh -c "npm install && npm run dev"
    profiles:
      - dev
