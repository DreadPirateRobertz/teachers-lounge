name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'services/*/Dockerfile'
      - 'services/**'
      - 'frontend/Dockerfile'
      - 'frontend/**'
      - '.github/workflows/docker-publish.yml'

permissions:
  contents: read
  packages: write # GitHub Container Registry

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  REPOSITORY: dreadpiraterobertz/teachers-lounge

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changed services
        id: detect
        run: |
          services=()
          for svc_path in frontend services/*/; do
            svc_name=$(basename "$svc_path")
            if [ -f "${svc_path}/Dockerfile" ]; then
              if git diff --name-only HEAD~1 HEAD -- "$svc_path" | grep -q .; then
                services+=("$svc_name")
              fi
            fi
          done
          if [ ${#services[@]} -eq 0 ]; then
            echo "services=[]" >> "$GITHUB_OUTPUT"
          else
            json=$(printf '%s\n' "${services[@]}" | jq -R . | jq -sc .)
            echo "services=${json}" >> "$GITHUB_OUTPUT"
          fi

  build-push:
    needs: changes
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine build context
        id: ctx
        env:
          SERVICE_NAME: ${{ matrix.service }}
        run: |
          if [ "$SERVICE_NAME" = "frontend" ]; then
            echo "path=frontend" >> "$GITHUB_OUTPUT"
          else
            echo "path=services/${SERVICE_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.ctx.outputs.path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  update-tags:
    needs: [changes, build-push]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update Helm image tags
        env:
          CHANGED_SERVICES: ${{ needs.changes.outputs.services }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          for svc in $(echo "$CHANGED_SERVICES" | jq -r '.[]'); do
            values_file="infra/helm/${svc}/values-prod.yaml"
            if [ -f "$values_file" ]; then
              sed -i "s|tag:.*|tag: \"${COMMIT_SHA}\"|" "$values_file"
            fi
          done

      - name: Check for tag changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit tag updates
        if: steps.check.outputs.changed == 'true'
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/helm/*/values-prod.yaml
          git commit -m "chore: update image tags to ${COMMIT_SHA}"
          git push
