## TeachersLounge — Local Development Stack
## Usage: docker compose up
## Dev hot-reload: docker compose --profile dev up
##
## Copy .env.example to .env.local and fill in real API keys before starting.
## All other values are safe placeholder defaults for local dev.

name: teacherslounge

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tl_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword}
      POSTGRES_DB: teacherslounge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tl_app -d teacherslounge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-localredispassword} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-localredispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── AI Gateway (LiteLLM) ────────────────────────────────────────────────────

  ai-gateway:
    build:
      context: ./services/ai-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-placeholder-replace-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder-replace-me}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-localdevmasterkey}
      LITELLM_LOG: INFO
      LITELLM_TELEMETRY: "False"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Application Services ────────────────────────────────────────────────────

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: teacherslounge
      DB_USER: tl_app
      DB_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localredispassword}
      JWT_SECRET: ${JWT_SECRET:-localdevjwtsecret-replace-in-prod}
      JWT_EXPIRY_MINUTES: "15"
      REFRESH_TOKEN_EXPIRY_DAYS: "30"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tutoring-service:
    build:
      context: ./services/tutoring-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
      user-service:
        condition: service_healthy
    environment:
      PORT: "8000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: teacherslounge
      DB_USER: tl_app
      DB_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localredispassword}
      AI_GATEWAY_URL: http://ai-gateway:4000
      AI_GATEWAY_API_KEY: ${LITELLM_MASTER_KEY:-localdevmasterkey}
      USER_SERVICE_URL: http://user-service:8080
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_healthy
      tutoring-service:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_TUTORING_URL: http://localhost:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
