## TeachersLounge — Local Development Stack
## Usage: docker compose --env-file .env.local up --build
## Dev hot-reload: docker compose --env-file .env.local -f docker-compose.yml -f docker-compose.dev.yml up --build
##
## Copy .env.example to .env.local and fill in real API keys before starting.
## All other values are safe placeholder defaults for local dev.
##
## NOTE: NEXT_PUBLIC_* variables are baked into the Next.js bundle at BUILD time.
## Changing them at runtime has no effect. To use different values, pass them as
## build args and rebuild the frontend image (done automatically by docker compose
## --build). The defaults below target localhost — correct for local dev.

name: teacherslounge

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tl_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword}
      POSTGRES_DB: teacherslounge
    ports:
      # Bound to loopback only — not exposed on all interfaces
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tl_app -d teacherslounge"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-localredispassword} --appendonly yes
    ports:
      # Bound to loopback only — not exposed on all interfaces
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-localredispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── AI Gateway (LiteLLM) ────────────────────────────────────────────────────

  ai-gateway:
    build:
      context: ./services/ai-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-placeholder-replace-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder-replace-me}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-localdevmasterkey}
      LITELLM_LOG: INFO
      LITELLM_TELEMETRY: "False"
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Application Services ────────────────────────────────────────────────────

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: teacherslounge
      DB_USER: tl_app
      DB_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localredispassword}
      JWT_SECRET: ${JWT_SECRET:-localdevjwtsecret-replace-in-prod}
      JWT_EXPIRY_MINUTES: "15"
      REFRESH_TOKEN_EXPIRY_DAYS: "30"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tutoring-service:
    build:
      context: ./services/tutoring-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
      user-service:
        condition: service_healthy
    environment:
      PORT: "8000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: teacherslounge
      DB_USER: tl_app
      DB_PASSWORD: ${POSTGRES_PASSWORD:-localdevpassword}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localredispassword}
      AI_GATEWAY_URL: http://ai-gateway:4000
      AI_GATEWAY_API_KEY: ${LITELLM_MASTER_KEY:-localdevmasterkey}
      USER_SERVICE_URL: http://user-service:8080
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://tl_app:${POSTGRES_PASSWORD:-localdevpassword}@postgres:5432/teacherslounge"
      JWT_SECRET: ${JWT_SECRET:-localdevjwtsecret-replace-in-prod}
      ALLOWED_ORIGINS: "http://localhost:3000"
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8085/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      user-service:
        condition: service_healthy
      tutoring-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Server-side (SSR) URLs use Docker internal hostnames — not exposed to browser
      USER_SERVICE_URL: http://user-service:8080
      TUTORING_SERVICE_URL: http://tutoring-service:8000
      ANALYTICS_SERVICE_URL: http://analytics-service:8085
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
