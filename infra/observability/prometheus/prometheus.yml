global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: user-service
    metrics_path: /metrics
    static_configs:
      - targets: ["user-service:8080"]
        labels:
          service: user-service

  - job_name: tutoring-service
    metrics_path: /metrics
    static_configs:
      - targets: ["tutoring-service:8000"]
        labels:
          service: tutoring-service

  - job_name: gaming-service
    metrics_path: /metrics
    static_configs:
      - targets: ["gaming-service:8083"]
        labels:
          service: gaming-service

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: otel-collector
