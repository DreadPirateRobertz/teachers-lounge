apiVersion: 1

contactPoints:
  - orgId: 1
    name: default-webhook
    receivers:
      - uid: default-webhook
        type: webhook
        settings:
          url: "${ALERT_WEBHOOK_URL:-http://localhost:9999/alerts}"
          httpMethod: POST
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: default-webhook
    group_by: ["alertname", "job"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
