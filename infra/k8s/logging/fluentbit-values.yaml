## Helm values for Fluent Bit → Cloud Logging
## Chart: fluent/fluent-bit
## Install: helm upgrade --install fluent-bit fluent/fluent-bit \
##            --namespace logging --create-namespace \
##            --values infra/k8s/logging/fluentbit-values.yaml

## Fluent Bit runs as a DaemonSet; each node ships its container logs to Cloud Logging.
## GKE Autopilot: DaemonSets are allowed but require tolerations for system nodes.

tolerations:
  - operator: Exists  # Tolerate all taints — ensures logs from all nodes

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

## ── Pipeline configuration ──────────────────────────────────────────────────
config:
  service: |
    [SERVICE]
        Daemon       Off
        Log_Level    info
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020
        Parsers_File parsers.conf

  ## Collect container logs from all pods
  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

  ## Enrich with Kubernetes pod metadata
  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [FILTER]
        Name   nest
        Match  kube.*
        Operation lift
        Nested_under kubernetes
        Add_prefix kubernetes_

  ## Ship to Cloud Logging via the stackdriver output plugin
  ## Workload Identity on the fluentbit SA grants roles/logging.logWriter
  outputs: |
    [OUTPUT]
        Name        stackdriver
        Match       kube.*
        Resource    k8s_container
        k8s_cluster_name  teachers-lounge-cluster
        k8s_cluster_location  us-central1
        # Workers: set > 1 for higher throughput
        Workers     2

## ── Workload Identity ───────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations:
    # Grant log-write permission via Workload Identity (no key files)
    iam.gke.io/gcp-service-account: fluentbit@teachers-lounge.iam.gserviceaccount.com
