## ArgoCD Application — kube-prometheus-stack (prod)
## Managed by ArgoCD; chart pulled from prometheus-community Helm repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: ">=60.0.0"
    helm:
      valueFiles:
        - $repo/infra/k8s/monitoring/kube-prometheus-stack-values.yaml
  sources:
    - repoURL: https://github.com/teachers-lounge/teachers-lounge.git
      targetRevision: main
      ref: repo
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: ">=60.0.0"
      helm:
        valueFiles:
          - $repo/infra/k8s/monitoring/kube-prometheus-stack-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
