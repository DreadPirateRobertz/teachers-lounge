apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qdrant-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/teachers-lounge/teachers-lounge.git
    targetRevision: main
    path: infra/helm/qdrant
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    ## Deployed into its own namespace so DNS matches settings.qdrant_host:
    ## qdrant.qdrant.svc.cluster.local (search-service config.py default)
    namespace: qdrant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
