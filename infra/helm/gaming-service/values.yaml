replicaCount: 2

image:
  repository: us-docker.pkg.dev/teachers-lounge/services/gaming-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8083

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

env:
  PORT: "8083"
  DATABASE_URL: "postgres://gaming:$(DB_PASSWORD)@postgres.dev.svc.cluster.local:5432/gaming"  # overridden per env
  REDIS_ADDR: "redis.dev.svc.cluster.local:6379"

# Secrets are injected from Kubernetes Secret "gaming-service-secrets" — not stored in values
# DB_PASSWORD, JWT_SECRET

livenessProbe:
  httpGet:
    path: /health
    port: 8083
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health
    port: 8083
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  rpsScaling:
    enabled: false
    targetRPS: 500
    metricName: "autoscaling.googleapis.com|nginx_connections_active"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      maxPodsPerMinute: 2
    scaleDown:
      stabilizationWindowSeconds: 300
      maxPodsPerMinute: 1
