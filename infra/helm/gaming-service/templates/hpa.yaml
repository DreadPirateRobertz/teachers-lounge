{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "gaming-service.fullname" . }}
  labels:
    {{- include "gaming-service.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "gaming-service.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.rpsScaling.enabled }}
    # Primary: RPS-based scaling via GKE Stackdriver custom metrics adapter.
    # Gaming is read-heavy (leaderboard, profile); RPS is a more responsive signal than CPU.
    - type: External
      external:
        metric:
          name: {{ .Values.autoscaling.rpsScaling.metricName }}
          selector:
            matchLabels:
              {{- include "gaming-service.selectorLabels" . | nindent 14 }}
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.rpsScaling.targetRPS }}
    {{- end }}
    # Fallback: CPU utilization (catches non-traffic spikes, e.g. DB query bursts)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.autoscaling.behavior.scaleUp.stabilizationWindowSeconds }}
      policies:
        - type: Pods
          value: {{ .Values.autoscaling.behavior.scaleUp.maxPodsPerMinute }}
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.autoscaling.behavior.scaleDown.stabilizationWindowSeconds }}
      policies:
        - type: Pods
          value: {{ .Values.autoscaling.behavior.scaleDown.maxPodsPerMinute }}
          periodSeconds: 60
{{- end }}
