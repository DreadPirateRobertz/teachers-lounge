## ClusterIP service — used by search-service and ingestion-service.
## DNS: qdrant.qdrant.svc.cluster.local (matches settings.qdrant_host in search/config.py)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qdrant.fullname" . }}
  labels:
    {{- include "qdrant.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: 6333
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: 6334
  selector:
    {{- include "qdrant.selectorLabels" . | nindent 4 }}
---
## Headless service — provides stable DNS for StatefulSet pods.
## Used by peers for Raft consensus: qdrant-0.qdrant-headless.<ns>.svc.cluster.local:6335
apiVersion: v1
kind: Service
metadata:
  name: {{ include "qdrant.fullname" . }}-headless
  labels:
    {{- include "qdrant.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
    - name: grpc
      port: {{ .Values.service.grpcPort }}
    - name: p2p
      port: 6335
  selector:
    {{- include "qdrant.selectorLabels" . | nindent 4 }}
