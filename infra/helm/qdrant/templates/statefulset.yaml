## Qdrant distributed StatefulSet.
##
## Bootstrap logic: pod-0 starts as the initial cluster peer. Pods 1 and 2
## join via --bootstrap pointing at pod-0's p2p address. The pod ordinal is
## extracted from the hostname (e.g., "release-qdrant-1" → ordinal "1").
##
## The Downward API injects the pod namespace so the headless DNS name resolves
## correctly regardless of which namespace the chart is deployed into.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "qdrant.fullname" . }}
  labels:
    {{- include "qdrant.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "qdrant.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "qdrant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qdrant.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "qdrant.serviceAccountName" . }}
      ## Spread pods across nodes for HA — tolerate one node failure.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "qdrant.selectorLabels" . | nindent 14 }}
      containers:
        - name: qdrant
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ## Override the default entrypoint to conditionally add --bootstrap for non-zero pods.
          command: ["sh", "-c"]
          args:
            - |
              ORDINAL="${HOSTNAME##*-}"
              if [ "$ORDINAL" != "0" ]; then
                PEER_0="{{ include "qdrant.fullname" . }}-0.{{ include "qdrant.fullname" . }}-headless.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local"
                BOOTSTRAP_ARG="--bootstrap http://${PEER_0}:6335"
              fi
              exec /qdrant/qdrant $BOOTSTRAP_ARG
          env:
            - name: QDRANT__SERVICE__GRPC_PORT
              value: "6334"
            - name: QDRANT__CLUSTER__ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
            - name: p2p
              containerPort: 6335
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
            - name: qdrant-config
              mountPath: /qdrant/config/production.yaml
              subPath: production.yaml
      volumes:
        - name: qdrant-config
          configMap:
            name: {{ include "qdrant.fullname" . }}-config
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
