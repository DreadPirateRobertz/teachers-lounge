# Grafana dashboard — Platform Overview
# Shows request rate, error rate, and p99 latency for all TL services.
# Loaded automatically by the Grafana sidecar (label: grafana_dashboard=1).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-platform
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
    {{- include "tl-monitoring.labels" . | nindent 4 }}
data:
  platform-overview.json: |
    {
      "title": "TeachersLounge — Platform Overview",
      "uid": "tl-platform",
      "tags": ["teacherslounge", "platform"],
      "refresh": "30s",
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[5m])) by (service)",
              "legendFormat": "{{ "{{service}}" }}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (5xx %)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service) * 100",
              "legendFormat": "{{ "{{service}}" }}"
            }
          ]
        },
        {
          "id": 3,
          "title": "p99 Latency (ms)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) * 1000",
              "legendFormat": "{{ "{{service}}" }}"
            }
          ]
        }
      ]
    }
