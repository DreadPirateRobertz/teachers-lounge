{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "tutoring-service.fullname" . }}
  labels:
    {{- include "tutoring-service.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "tutoring-service.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.customMetricScaling.enabled }}
    # Primary: active_streaming_sessions custom metric.
    # CPU is misleading for SSE workloads — threads block on LLM I/O, not CPU.
    # This metric (exposed by /metrics) reflects actual load directly.
    - type: Pods
      pods:
        metric:
          name: {{ .Values.autoscaling.customMetricScaling.metricName }}
        target:
          type: AverageValue
          averageValue: {{ .Values.autoscaling.customMetricScaling.targetActiveStreamingSessions }}
    {{- end }}
    # CPU fallback: covers startup, DB queries, and cases where custom metric is unavailable
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.autoscaling.behavior.scaleUp.stabilizationWindowSeconds }}
      policies:
        - type: Pods
          value: {{ .Values.autoscaling.behavior.scaleUp.maxPodsPerMinute }}
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.autoscaling.behavior.scaleDown.stabilizationWindowSeconds }}
      policies:
        - type: Pods
          value: {{ .Values.autoscaling.behavior.scaleDown.maxPodsPerMinute }}
          periodSeconds: 60
{{- end }}
