replicaCount: 2

image:
  repository: us-docker.pkg.dev/teachers-lounge/services/frontend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  host: app.teacherslounge.app
  tlsSecretName: frontend-tls

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  NEXT_PUBLIC_API_URL: "https://api.teacherslounge.app"
  NODE_ENV: "production"

livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      maxPodsPerMinute: 2
    scaleDown:
      stabilizationWindowSeconds: 300
      maxPodsPerMinute: 1
