image:
  repository: prom/prometheus
  tag: v2.51.0
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9090

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

storage:
  size: 10Gi
  retentionDays: 15

scrapeConfigs:
  userService: "user-service.{{ .Release.Namespace }}.svc.cluster.local:8080"
  tutoringService: "tutoring-service.{{ .Release.Namespace }}.svc.cluster.local:8000"
  gamingService: "gaming-service.{{ .Release.Namespace }}.svc.cluster.local:8083"
  otelCollector: "otel-collector.{{ .Release.Namespace }}.svc.cluster.local:8888"
