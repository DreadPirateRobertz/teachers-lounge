apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: teachers-lounge
  labels:
    app: ai-gateway
data:
  litellm_config.yaml: |
    model_list:
      - model_name: tutor-primary
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
          max_tokens: 4096
          temperature: 0.7

      - model_name: tutor-fast
        litellm_params:
          model: anthropic/claude-haiku-4-5-20251001
          api_key: os.environ/ANTHROPIC_API_KEY
          max_tokens: 1024
          temperature: 0.8

    litellm_settings:
      drop_params: true
      store_prompts_in_spend_logs: false

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/LITELLM_DATABASE_URL

    router_settings:
      routing_strategy: simple-shuffle
      num_retries: 3
      retry_after: 1
      timeout: 60
