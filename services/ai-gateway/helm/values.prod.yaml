## Production overrides — applied on top of values.yaml
## Usage: helm upgrade ai-gateway ./helm -f values.yaml -f values.prod.yaml -n teachers-lounge

litellm:
  replicaCount: 2    # HPA min; autoscaling handles the rest

  image:
    # Pin to a specific digest in production — never use :latest in prod
    # tag: "main-<git-sha>"

  config:
    litellm_settings:
      # In production: full logging pipeline
      success_callback: ["langfuse", "prometheus"]
      failure_callback: ["langfuse", "prometheus"]
      # Emit OpenTelemetry spans to the cluster's OTel collector
      service_callback: ["otel"]

    general_settings:
      rate_limit_policy:
        default:
          tpm: 100000
          rpm: 60
        # Premium subscribers get higher limits (set via LiteLLM API on sub creation)
        premium:
          tpm: 500000
          rpm: 300

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
