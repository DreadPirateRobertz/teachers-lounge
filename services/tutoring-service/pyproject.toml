[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
# E501 excluded — codebase uses wide banner comments and long string literals
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# Test files: F401 (conftest re-exports), F841 (assigned-but-unused mocks),
# I001 (import ordering less critical in test files with inline imports).
"tests/**" = ["F401", "F841", "I001"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
