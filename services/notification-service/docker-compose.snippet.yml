# Add this service block to docker-compose.yml once tl-jkr merges.
# It goes under the `services:` key alongside the other services.

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "9000"
      DATABASE_URL: postgres://tl_app:${POSTGRES_PASSWORD:-localdevpassword}@postgres:5432/teacherslounge
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-localredispassword}
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
